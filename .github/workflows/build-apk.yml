name: Build C2 Android Worker APK

on:
  push:
    branches:
      - '**' # Tự động bấm nút chạy không đợi lệnh
  workflow_dispatch:

jobs:
  build_apk:
    runs-on: ubuntu-latest

    steps:
    - name: 📦 Checkout Repository
      uses: actions/checkout@v4

    - name: ⚙️ Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 🛠️ Install React Native Dependencies
      run: |
        npm install react-native-webview socket.io-client expo
        npx expo prebuild -p android --clean

    - name: ☕ Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'adopt'

    - name: 🔨 Compile Android Native APK (Gradle)
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease

    - name: 🚀 Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: C2-Worker-Release-APK
        path: android/app/build/outputs/apk/release/app-release.apk
